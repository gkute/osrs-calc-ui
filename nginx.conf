worker_processes auto;
error_log  /dev/stderr warn;
pid        /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  sendfile   on;
  keepalive_timeout 65;

  # Shared memory for caching the GCP SA identity token across all workers.
  # Tokens are valid for 1 hour; we refresh at 55 minutes.
  lua_shared_dict token_cache 1m;

  server {
    listen 8080;
    root  /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # BFF proxy: inject GCP SA identity token and forward to the API.
    #
    # The UI Cloud Run runs as osrs-ui-sa which holds roles/run.invoker
    # on the osrs-api service.  The metadata server issues a short-lived
    # OIDC token scoped to the API audience which Cloud Run IAM verifies.
    # ------------------------------------------------------------------
    location /api/ {
      content_by_lua_block {
        local http     = require("resty.http")
        local api_base = os.getenv("API_URL")

        if not api_base or api_base == "" then
          ngx.status = 500
          ngx.say("API_URL environment variable is not configured")
          return
        end

        -- Retrieve cached token or fetch a fresh one from the metadata server
        local cache = ngx.shared.token_cache
        local token = cache:get("id_token")

        if not token then
          local meta_httpc = http.new()
          local meta_res, meta_err = meta_httpc:request_uri(
            "http://metadata.google.internal/computeMetadata/v1/instance"
            .. "/service-accounts/default/identity"
            .. "?audience=" .. api_base .. "&format=full",
            {
              method  = "GET",
              headers = { ["Metadata-Flavor"] = "Google" },
            }
          )

          if not meta_res or meta_res.status ~= 200 then
            ngx.status = 502
            ngx.say(
              "Could not obtain GCP identity token: "
              .. (meta_err or ("HTTP " .. (meta_res and tostring(meta_res.status) or "nil")))
            )
            return
          end

          token = meta_res.body
          cache:set("id_token", token, 3300)  -- 55-minute TTL
        end

        -- Strip /api prefix for the upstream path
        local upstream_path = string.sub(ngx.var.uri, 5)
        if upstream_path == "" then upstream_path = "/" end

        local upstream_url = api_base .. upstream_path
        if ngx.var.args and ngx.var.args ~= "" then
          upstream_url = upstream_url .. "?" .. ngx.var.args
        end

        -- Forward the request with the SA identity token
        ngx.req.read_body()
        local req_hdrs = ngx.req.get_headers()
        local httpc    = http.new()

        local res, err = httpc:request_uri(upstream_url, {
          method     = ngx.req.get_method(),
          headers    = {
            ["Authorization"]  = "Bearer " .. token,
            ["Content-Type"]   = req_hdrs["content-type"],
            ["Accept"]         = req_hdrs["accept"],
            ["X-Real-IP"]      = ngx.var.remote_addr,
          },
          body       = ngx.req.get_body_data(),
          ssl_verify = true,
        })

        if not res then
          ngx.status = 502
          ngx.say("API upstream error: " .. (err or "unknown"))
          return
        end

        ngx.status = res.status
        for k, v in pairs(res.headers) do
          -- Drop transfer-encoding to avoid conflicts with our buffered response
          if k:lower() ~= "transfer-encoding" then
            ngx.header[k] = v
          end
        end
        ngx.print(res.body)
      }
    }

    # Angular SPA — client-side routing
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Immutable static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}

